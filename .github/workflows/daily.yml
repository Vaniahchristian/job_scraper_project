name: Daily Job Alert

on:
  schedule:
    # Three times a day, East Africa Time (UTC+3):
    # 06:00 EAT → 03:00 UTC | 12:00 EAT → 09:00 UTC | 18:00 EAT → 15:00 UTC
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      test_telegram:
        description: "Send a test Telegram ping (skip job scrape)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.test_telegram }}" = "true" ]; then
            python job_alert.py --test
          else
            python job_alert.py
          fi

      - name: Save updated seen_jobs.json
        run: |
          git config user.name "job-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "Update seen jobs"
          git push
